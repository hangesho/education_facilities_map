<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>教育施設GeoJSONマップ（ローカル対応版）</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    html, body { margin:0; padding:0; height:100%; font-family:sans-serif; background:#f5f7fb; }
    .app { display:flex; flex-direction:column; height:100%; }
    .header { padding:12px 16px; background:#fff; border-bottom:1px solid #d9e1ec; box-shadow:0 1px 4px rgba(0,0,0,0.06); z-index:1000; }
    .header h1 { margin:0 0 6px 0; font-size:18px; }
    .header p { margin:4px 0; font-size:13px; color:#444; line-height:1.5; }
    .controls { margin-top:8px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .btn, .file-label, select {
      display:inline-block; padding:8px 12px; border-radius:8px; border:1px solid #c8d3e1;
      background:#fff; cursor:pointer; font-size:13px;
    }
    .btn:hover, .file-label:hover { background:#f7faff; }
    input[type="file"] { display:none; }
    #status { margin-top:8px; font-size:13px; color:#1f4b99; white-space:pre-wrap; }
    .note { color:#9a4d00; font-weight:bold; }
    .ok { color:#0f6b2d; font-weight:bold; }
    #map { flex:1; min-height:400px; background:#eef3f8; }
    .popup-table { border-collapse:collapse; width:100%; font-size:13px; }
    .popup-table th, .popup-table td { border:1px solid #d9e1ec; padding:4px 6px; vertical-align:top; text-align:left; }
    .popup-table th { background:#f3f6fb; width:96px; }
    .leaflet-popup-content { min-width:260px; }
    .legend {
      background:#fff; padding:8px 10px; border-radius:8px; box-shadow:0 1px 4px rgba(0,0,0,0.15);
      line-height:1.5; font-size:12px;
    }
    .legend-item { display:flex; align-items:center; gap:6px; margin:2px 0; }
    .legend-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>教育施設GeoJSONマップ（ローカル対応版）</h1>
      <p>地図タイルは OpenStreetMap 直結をやめて、ローカルHTMLでも動きやすい別のベースマップを使います。</p>
      <p>GeoJSON は同じフォルダからの自動読込を試し、失敗した場合はファイル選択で直接読み込みます。</p>

      <div class="controls">
        <button id="retryBtn" class="btn" type="button">同じフォルダから再読込</button>
        <label class="file-label" for="fileInput">GeoJSONファイルを選択</label>
        <input id="fileInput" type="file" accept=".geojson,.json,application/geo+json,application/json" />
        <select id="typeFilter">
          <option value="">すべての種別</option>
        </select>
      </div>

      <div id="status">GeoJSONを読み込み中です...</div>
    </div>
    <div id="map"></div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    const GEOJSON_FILE = 'P29-23_13.geojson';

    const schoolTypeMap = {
      "16001": "小学校",
      "16002": "中学校",
      "16003": "中等教育学校",
      "16004": "高等学校",
      "16005": "高等専門学校",
      "16006": "短期大学",
      "16007": "大学",
      "16011": "幼稚園",
      "16012": "特別支援学校",
      "16013": "幼保連携型認定こども園",
      "16014": "義務教育学校",
      "16015": "各種学校",
      "16016": "専修学校"
    };

    const colorMap = {
      "16001": "#1f77b4",
      "16002": "#ff7f0e",
      "16003": "#2ca02c",
      "16004": "#d62728",
      "16005": "#9467bd",
      "16006": "#8c564b",
      "16007": "#e377c2",
      "16011": "#17becf",
      "16012": "#bcbd22",
      "16013": "#7f7f7f",
      "16014": "#8dd3c7",
      "16015": "#fb8072",
      "16016": "#80b1d3"
    };

    const map = L.map('map').setView([35.681236, 139.767125], 10);

    // OSM直結ではなくCARTOのベースマップを使用
    const baseLayer = L.tileLayer(
      'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
      {
        subdomains: 'abcd',
        maxZoom: 20,
        attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
      }
    ).addTo(map);

    const markers = L.layerGroup().addTo(map);
    const status = document.getElementById('status');
    const fileInput = document.getElementById('fileInput');
    const retryBtn = document.getElementById('retryBtn');
    const typeFilter = document.getElementById('typeFilter');

    let currentGeoJSON = null;
    let currentSourceLabel = '';

    function escapeHtml(value) {
      if (value === null || value === undefined) return '';
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function getTypeName(code) {
      return schoolTypeMap[code] || `不明 (${code || ''})`;
    }

    function getMarkerColor(code) {
      return colorMap[code] || '#3366cc';
    }

    function createPopupContent(props, latlng) {
      const typeCode = props.P29_003 ?? '';
      const typeName = getTypeName(typeCode);
      return `
        <table class="popup-table">
          <tr><th>施設名</th><td>${escapeHtml(props.P29_004 || '')}</td></tr>
          <tr><th>種別</th><td>${escapeHtml(typeName)}</td></tr>
          <tr><th>住所</th><td>${escapeHtml(props.P29_005 || '')}</td></tr>
          <tr><th>自治体コード</th><td>${escapeHtml(props.P29_001 || '')}</td></tr>
          <tr><th>施設ID</th><td>${escapeHtml(props.P29_002 || '')}</td></tr>
          <tr><th>補足</th><td>${escapeHtml(props.P29_009 || '')}</td></tr>
          <tr><th>座標</th><td>${latlng.lat.toFixed(6)}, ${latlng.lng.toFixed(6)}</td></tr>
        </table>
      `;
    }

    function buildTypeFilter(features) {
      const codes = [...new Set(
        features
          .map(f => f && f.properties ? f.properties.P29_003 : '')
          .filter(Boolean)
      )].sort();

      typeFilter.innerHTML = '<option value="">すべての種別</option>';
      for (const code of codes) {
        const option = document.createElement('option');
        option.value = code;
        option.textContent = `${getTypeName(code)} (${code})`;
        typeFilter.appendChild(option);
      }
    }

    function renderGeoJSON(geojson, sourceLabel) {
      if (!geojson || geojson.type !== 'FeatureCollection' || !Array.isArray(geojson.features)) {
        throw new Error('GeoJSONの形式が想定と異なります。');
      }

      currentGeoJSON = geojson;
      currentSourceLabel = sourceLabel;
      buildTypeFilter(geojson.features);
      renderFiltered();
    }

    function renderFiltered() {
      if (!currentGeoJSON) return;

      const selectedType = typeFilter.value;
      const filteredFeatures = currentGeoJSON.features.filter(feature => {
        if (!selectedType) return true;
        return (feature.properties && feature.properties.P29_003) === selectedType;
      });

      markers.clearLayers();

      const filteredGeoJSON = {
        type: 'FeatureCollection',
        features: filteredFeatures
      };

      const layer = L.geoJSON(filteredGeoJSON, {
        pointToLayer: function(feature, latlng) {
          const code = feature.properties ? feature.properties.P29_003 : '';
          return L.circleMarker(latlng, {
            radius: 5,
            weight: 1,
            color: getMarkerColor(code),
            fillColor: getMarkerColor(code),
            opacity: 1,
            fillOpacity: 0.8
          });
        },
        onEachFeature: function(feature, layer) {
          const props = feature.properties || {};
          layer.bindPopup(createPopupContent(props, layer.getLatLng()));
        }
      });

      layer.addTo(markers);

      const bounds = layer.getBounds();
      if (bounds.isValid()) {
        map.fitBounds(bounds, { padding: [20, 20] });
      }

      const filterLabel = selectedType ? `\n表示種別: ${getTypeName(selectedType)} (${selectedType})` : '';
      status.innerHTML =
        `<span class="ok">読み込み完了</span>: ${filteredFeatures.length.toLocaleString()} 件の施設を表示しています。\n` +
        `読込元: ${escapeHtml(currentSourceLabel)}${filterLabel}`;
    }

    async function loadFromSameFolder() {
      status.textContent = '同じフォルダにある GeoJSON を読み込み中です...';
      try {
        const response = await fetch(GEOJSON_FILE);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status} ${response.statusText}`);
        }
        const geojson = await response.json();
        renderGeoJSON(geojson, `${GEOJSON_FILE}（同じフォルダ）`);
      } catch (error) {
        console.error('fetch 読み込みエラー:', error);
        status.innerHTML =
          `<span class="note">同じフォルダからの自動読込に失敗しました。</span>\n` +
          `原因: ${escapeHtml(error.message)}\n\n` +
          `下の「GeoJSONファイルを選択」から直接読み込んでください。`;
      }
    }

    function loadFromSelectedFile(file) {
      if (!file) return;
      status.textContent = `選択したファイルを読み込み中です: ${file.name}`;
      const reader = new FileReader();

      reader.onload = function(event) {
        try {
          const text = event.target.result;
          const geojson = JSON.parse(text);
          renderGeoJSON(geojson, `${file.name}（ファイル選択）`);
        } catch (error) {
          console.error('FileReader 読み込みエラー:', error);
          status.innerHTML =
            `<span class="note">選択したファイルの読込に失敗しました。</span>\n` +
            `原因: ${escapeHtml(error.message)}`;
        }
      };

      reader.onerror = function() {
        status.innerHTML = `<span class="note">ファイルの読み込みに失敗しました。</span>`;
      };

      reader.readAsText(file, 'utf-8');
    }

    typeFilter.addEventListener('change', renderFiltered);
    retryBtn.addEventListener('click', loadFromSameFolder);
    fileInput.addEventListener('change', function(event) {
      const file = event.target.files && event.target.files[0];
      loadFromSelectedFile(file);
    });

    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = function() {
      const div = L.DomUtil.create('div', 'legend');
      const items = [
        ['16001', '小学校'], ['16002', '中学校'], ['16004', '高等学校'],
        ['16007', '大学'], ['16011', '幼稚園'], ['16016', '専修学校']
      ];
      div.innerHTML = '<strong>凡例</strong>';
      items.forEach(([code, name]) => {
        div.innerHTML += `<div class="legend-item"><span class="legend-dot" style="background:${getMarkerColor(code)}"></span>${name}</div>`;
      });
      return div;
    };
    legend.addTo(map);

    baseLayer.on('tileerror', function() {
      status.innerHTML += '\nベースマップの読込に失敗した場合でも、施設ポイント自体は表示できます。';
    });

    loadFromSameFolder();
  </script>
</body>
</html>
